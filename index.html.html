<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>직선의 기울기 문제</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
        }
        .problem {
            margin-bottom: 20px;
        }
        .input-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        #input-answer {
            width: 200px;
            height: 30px;
            font-size: 1em;
            margin-right: 10px;
        }
        #submit-answer {
            height: 36px;
            font-size: 1em;
        }
        .result {
            margin-top: 10px;
            color: green;
        }
        .error {
            color: red;
        }
        .scoreboard {
            margin-top: 20px;
            font-weight: bold;
        }
        .final-summary {
            margin-top: 30px;
        }
        .example {
            margin-top: 10px;
            font-size: 0.9em;
            color: grey;
        }
        #retry-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.1em;
            cursor: pointer;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            let problems = [];
            let currentIndex = 0;
            let score = 0;
            let attempts = 3;
            let timer = 50;
            let interval;
            let results = [];

            // Generate 3 random problems
            function generateProblems() {
                problems = [];
                for (let i = 0; i < 3; i++) {
                    let a = getRandomNonZero(-9, 9);
                    let b = getRandomNonZero(-9, 9);
                    let c = getRandomNonZero(-9, 9);
                    problems.push({ a, b, c });
                }
            }

            // Generate a random non-zero number in a range
            function getRandomNonZero(min, max) {
                let num;
                do {
                    num = Math.floor(Math.random() * (max - min + 1)) + min;
                } while (num === 0);
                return num;
            }

            // Get the greatest common divisor (GCD)
            function gcd(x, y) {
                return y === 0 ? x : gcd(y, x % y);
            }

            // Reduce a fraction to lowest terms
            function reduceFraction(numerator, denominator) {
                const divisor = gcd(Math.abs(numerator), Math.abs(denominator));
                const reducedNumerator = numerator / divisor;
                const reducedDenominator = denominator / divisor;

                // Ensure the denominator is always positive
                return {
                    numerator: reducedDenominator < 0 ? -reducedNumerator : reducedNumerator,
                    denominator: reducedDenominator < 0 ? -reducedDenominator : reducedDenominator
                };
            }

            // Start the timer for each question
            function startTimer() {
                timer = 50;
                clearInterval(interval);
                interval = setInterval(() => {
                    document.getElementById("timer").textContent = `남은 시간: ${timer}초`;
                    timer--;
                    if (timer < 0) {
                        clearInterval(interval);
                        handleIncorrectAnswer("시간 초과");
                    }
                }, 1000);
            }

            // Get the formatted slope as a reduced fraction
            function getFormattedSlope(a, b) {
                const reduced = reduceFraction(-a, b);
                return `${reduced.numerator}/${reduced.denominator}`;
            }

            // Check if two fractions are mathematically equivalent
            function areFractionsEquivalent(num1, den1, num2, den2) {
                return num1 * den2 === num2 * den1;
            }

            // Show the next problem
            function showProblem() {
                if (currentIndex >= problems.length) {
                    finishQuiz();
                    return;
                }

                const problem = problems[currentIndex];
                const equation = `${problem.a}x + (${problem.b})y = ${problem.c}`;
                document.getElementById("problem").textContent = `문제 ${currentIndex + 1}: ${equation}`;
                document.getElementById("input-answer").value = "";
                document.getElementById("timer").textContent = `남은 시간: ${timer}초`;
                document.getElementById("result").textContent = "";
                document.getElementById("scoreboard").textContent = `현재 점수: ${score}점 / 남은 문제: ${problems.length - currentIndex}`;
                document.getElementById("example").textContent = "예시: 정수형 정답은 -1, 분수형 정답은 -3/2";

                startTimer();
            }

            // Check the answer and validate for reduction
            function checkAnswer() {
                const answerInput = document.getElementById("input-answer").value.trim();
                if (!answerInput.includes("/") && !answerInput.match(/^[-0-9]+$/)) {
                    document.getElementById("result").textContent = "정답은 정수 또는 약분된 분수 (분자/분모) 형태로 입력해주세요.";
                    document.getElementById("result").classList.add("error");
                    return;
                }

                const problem = problems[currentIndex];
                const correctSlope = getFormattedSlope(problem.a, problem.b);
                const [correctNumerator, correctDenominator] = correctSlope
                    .split("/")
                    .map(Number);

                const [inputNumerator, inputDenominator] =
                    answerInput.includes("/")
                        ? answerInput.split("/").map(Number)
                        : [Number(answerInput), 1];

                // Check if the input fraction is mathematically equivalent to the correct fraction
                if (areFractionsEquivalent(inputNumerator, inputDenominator, correctNumerator, correctDenominator)) {
                    // Check if the user's fraction is reduced
                    const userReduced = reduceFraction(inputNumerator, inputDenominator);
                    const reducedSlope = `${userReduced.numerator}/${userReduced.denominator}`;

                    if (reducedSlope === correctSlope) {
                        clearInterval(interval);
                        const earnedScore = timer > 0 ? timer : 0;
                        score += earnedScore;
                        results.push({
                            문제: `${problem.a}x + (${problem.b})y = ${problem.c}`,
                            입력값: answerInput,
                            정답: correctSlope,
                            메시지: "정답"
                        });
                        document.getElementById("result").textContent = `정답! ${earnedScore}점 획득!`;
                        document.getElementById("result").classList.remove("error");
                        document.getElementById("result").classList.add("result");
                        currentIndex++;
                        attempts = 3;
                        setTimeout(showProblem, 1500);
                    } else {
                        // Fraction not reduced
                        results.push({
                            문제: `${problem.a}x + (${problem.b})y = ${problem.c}`,
                            입력값: answerInput,
                            정답: correctSlope,
                            메시지: "약분 필요"
                        });
                        document.getElementById("result").textContent = "정답은 약분된 형태로 입력해주세요!";
                        document.getElementById("result").classList.add("error");
                        attempts--;
                        if (attempts === 0) {
                            handleIncorrectAnswer("기회를 모두 소진했습니다.");
                        }
                    }
                } else {
                    // Completely incorrect answer
                    attempts--;
                    if (attempts === 0) {
                        handleIncorrectAnswer("기회를 모두 소진했습니다.");
                    } else {
                        document.getElementById("result").textContent = `오답! 남은 시도: ${attempts}번`;
                        document.getElementById("result").classList.add("error");
                    }
                }
            }

            // Handle incorrect answer or timeout
            function handleIncorrectAnswer(message) {
                clearInterval(interval);
                const problem = problems[currentIndex];
                const correctSlope = getFormattedSlope(problem.a, problem.b);
                results.push({
                    문제: `${problem.a}x + (${problem.b})y = ${problem.c}`,
                    입력값: "-",
                    정답: correctSlope,
                    메시지: message
                });
                document.getElementById("result").textContent = `${message} 정답은 ${correctSlope}입니다.`;
                document.getElementById("result").classList.add("error");
                currentIndex++;
                attempts = 3;
                setTimeout(showProblem, 1500);
            }

            // Finish the quiz and show the summary
            function finishQuiz() {
                clearInterval(interval);
                let summaryHTML = "<h2>퀴즈 결과</h2>";
                results.forEach((result, index) => {
                    summaryHTML += `<p>문제 ${index + 1}: ${result.문제}<br>입력값: ${result.입력값}<br>정답: ${result.정답}<br>결과: ${result.메시지}</p>`;
                });
                summaryHTML += `<p>최종 점수: ${score}점</p>`;
                summaryHTML += `<button id="retry-button">다시 도전하기</button>`;
                document.getElementById("quiz-container").innerHTML = summaryHTML;

                // Register event after replacing innerHTML
                document.getElementById("retry-button").addEventListener("click", restartQuiz);
            }

            // Restart the quiz
            function restartQuiz() {
                currentIndex = 0;
                score = 0;
                attempts = 3;
                results = [];
                generateProblems();

                // Reset the quiz container
                document.getElementById("quiz-container").innerHTML = `
                    <h1>직선의 기울기 문제</h1>
                    <div id="problem" class="problem"></div>
                    <div class="input-container">
                        <input type="text" id="input-answer" />
                        <button id="submit-answer">제출</button>
                    </div>
                    <div id="example" class="example"></div>
                    <div id="timer">남은 시간: 50초</div>
                    <div id="result"></div>
                    <div id="scoreboard" class="scoreboard"></div>
                `;
                document.getElementById("submit-answer").addEventListener("click", checkAnswer);
                document.getElementById("input-answer").addEventListener("keydown", function (event) {
                    if (event.key === "Enter") {
                        checkAnswer();
                    }
                });

                showProblem();
            }

            // Start the quiz
            function startQuiz() {
                generateProblems();
                showProblem();

                document.getElementById("submit-answer").addEventListener("click", checkAnswer);
                document.getElementById("input-answer").addEventListener("keydown", function (event) {
                    if (event.key === "Enter") {
                        checkAnswer();
                    }
                });
            }

            // Initialize the quiz
            startQuiz();
        });
    </script>
</head>
<body>
    <div id="quiz-container">
        <h1>직선의 기울기 문제</h1>
        <div id="problem" class="problem"></div>
        <div class="input-container">
            <input type="text" id="input-answer" />
            <button id="submit-answer">제출</button>
        </div>
        <div id="example" class="example"></div>
        <div id="timer">남은 시간: 50초</div>
        <div id="result"></div>
        <div id="scoreboard" class="scoreboard"></div>
    </div>
</body>
</html>
